services:
  shm-client:
    image: danuk/shm-client-2:latest
    ports:
      - "3001:80"
    environment:
      SHM_URL: "https://api.mydomain.com"
      APP_NAME: "My Company"
      APP_DESCRIPTION: "My Company Description"
    restart: unless-stopped

  support-api:
    image: ghcr.io/k0sha/shm-support-api:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      SHM_INTERNAL_URL: "${SHM_INTERNAL_URL}"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_BUCKET: "support"
      CORS_ORIGIN: "${CORS_ORIGIN}"
      SHM_ADMIN_LOGIN: "${SHM_ADMIN_LOGIN}"
      SHM_ADMIN_PASSWORD: "${SHM_ADMIN_PASSWORD}"
      SHM_WEBHOOK_URL: "${SHM_WEBHOOK_URL}"
      SHM_WEBHOOK_SECRET: "${SHM_WEBHOOK_SECRET}"
      SPECIALIST_USER_IDS: "${SPECIALIST_USER_IDS}"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - default
      - shm_default
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:

networks:
  shm_default:
    external: true
